<html lang="en">
<head>

<body>

    <div class="choose3cards">CHOOSE 3 CARDS</div>
    <div class="stepnum1">1</div>

    <div class="subtext1">What has shaped you?</div>

    <div class="label3">Future</div>

    <div class="decoline2"></div>
       
    <div class="questioncontainer">Ask the universe</div>
        <form class="questionpanel"></div>
            <input type="text" placeholder= "Type your question here...">
    </div>
