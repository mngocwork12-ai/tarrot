<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tarot Reading Result</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #FAF7F5;
            color: #241F1C;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #241F1C;
            text-align: center;
        }
        .question, .cards, .reading {
            margin-bottom: 20px;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card {
            padding: 10px;
            border: 1px solid #BFB3A6;
            border-radius: 4px;
            background: #FAF7F5;
        }
        .reading {
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your Tarot Reading</h1>
        <div class="question">
            <strong>Question:</strong> <span id="userQuestion"></span>
        </div>
        <div class="cards">
            <strong>Selected Cards:</strong>
            <div id="selectedCards"></div>
        </div>
        <div class="reading">
            <strong>Reading:</strong>
            <p id="aiResponse"></p>
        </div>
    </div>

    <script> 
        const urlParams = new URLSearchParams(window.location.search);
        const question = urlParams.get('question') || 'No question provided';
        const responseText = urlParams.get('response') || 'No response available';
        const cardsParam = urlParams.get('cards');

        document.getElementById('userQuestion').textContent = question;
        document.getElementById('aiResponse').innerHTML = responseText.replace(/\n/g, '<br>'); 

        if (cardsParam) {
            const cards = JSON.parse(decodeURIComponent(cardsParam));
            const cardsContainer = document.getElementById('selectedCards');
            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.textContent = `${card.name} (${card.number})`;
                cardsContainer.appendChild(cardDiv);
            });
             }
    </script>
       
</body>
</html>
