<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tarrot Card Reading</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="decoline1"></div>
    <span class="choose3cards"> Enter your question - Choose three cards - Confirm </span>
    <div class="stepnum1">1</div>
    <div class="label1">Past</div>
    <span class="subtext1">What has shaped you?</span>
    <div class="stepnum2">2</div>
    <div class="label2">Present</div>
    <span class="subtext2">What is happening now?</span>
    <div class="stepnum3">3</div>
    <div class="label3">Future</div>
    <span class="subtext3">What lies ahead?</span>
    <div class="decoline2"></div>
    <div>
        <form class="questionpanel">
            <input type="text" placeholder= 'Ask the universe'>
            <button type="submit" id="submitbutton">Confirm</button>
            <div class="spinner-grow" role="status" id="loadingSpinner" style="display: none;">
                <span class="sr-only"></span>
            </div>
        </form>
    </div>
    <div class="card-grid" id="cardGrid"></div>

    <script src="AI.js"></script>
    <script src="script.js"></script>
  
</body>
</html>
