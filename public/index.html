<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tarrot Card Reading</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="decoline1"></div>
    <span class="choose3cards">Enter your question, then choose 3 cards</span>
    <div class="stepnum1">1</div>
    <div class="label1">Past</div>
    <div class="subtext1">What has shaped you?</div>
    <div class="stepnum2">2</div>
    <div class="label2">Present</div>
    <div class="subtext2">What is happening now?</div>
    <div class="stepnum3">3</div>
    <div class="label3">Future</div>
    <div class="subtext3">What lies ahead?</div>
    <div class="decoline2"></div>
    <div>
        <form class="questionpanel">
            <input type="text" placeholder= 'Ask the universe'>
            <button type="submit">Send</button>
        </form>
    </div>
    <div class="card-grid" id="cardGrid"></div>

    <script src="AI.js"></script>
    <script src="script.js"></script>
  
</body>
</html>
